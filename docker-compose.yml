services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: haulage
      POSTGRES_PASSWORD: haulage123
      POSTGRES_DB: haulage_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U haulage -d haulage_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://haulage:haulage123@db:5432/haulage_db
      SECRET_KEY: secret-key-change-in-production
    volumes:
      - ./logs:/app/logs

volumes:
  postgres_data: