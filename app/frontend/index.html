<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haulage Management System</title>
    
    <!-- CSS Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.0.0/fonts/remixicon.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- Login Container -->
    <div id="loginContainer" class="min-h-screen flex items-center justify-center p-4" >
        <div class="login-container">
            <!-- Logo Section -->
            <div class="login-header">
                <div class="login-logo">
                    <i class="ri-truck-line"></i>
                </div>
                <h2>Welcome back</h2>
                <p>Sign in to your account to continue</p>
            </div>
            
            <!-- Login Form -->
            <form id="loginForm" onsubmit="event.preventDefault(); login();">
                <div class="form-group">
                    <label class="required">Username</label>
                    <div class="input-icon">
                        <i class="ri-user-line"></i>
                        <input type="text" id="username" value="admin" autocomplete="off" autofocus>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="required">Password</label>
                    <div class="input-icon">
                        <i class="ri-lock-line"></i>
                        <input type="password" id="password" value="admin">
                        <button type="button" class="password-toggle" onclick="togglePassword()">
                            <i class="ri-eye-line"></i>
                        </button>
                    </div>
                </div>
                
                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" id="rememberMe">
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>
                
                <button type="submit" class="login-btn">
                    <span>Sign In</span>
                    <i class="ri-arrow-right-line"></i>
                </button>
            </form>
            
            <div id="loginError" class="login-error"></div>
        
        </div>
    </div>

    <!-- Main Dashboard -->
    <div id="dashboardContainer" class="hidden">
        <!-- Sidebar -->
        <div id="sidebar"></div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Header -->
            <div id="pageHeader"></div>

            <!-- Dashboard Section -->
            <div id="dashboardSection">
                <div id="statsCards"></div>
                <div id="chartsSection"></div>
                <div id="recentActivity"></div>
            </div>

            <!-- Trucks Section -->
            <div id="trucksSection" class="hidden">
                <div id="truckForm"></div>
                <div id="trucksTable"></div>
            </div>

            <!-- Drivers Section -->
            <div id="driversSection" class="hidden">
                <div id="driverForm"></div>
                <div id="driversTable"></div>
            </div>

            <!-- Jobs Section -->
            <div id="jobsSection" class="hidden">
                <div id="jobForm"></div>
                <div id="jobsTable"></div>
            </div>
        </div>
    </div>

    <!-- JavaScript Modules -->
    <script src="/static/js/utils.js"></script>
    <script src="/static/js/dashboard-refresh.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/components.js"></script>
    <script src="/static/js/dashboard.js"></script>
    <script src="/static/js/trucks.js"></script>
    <script src="/static/js/drivers.js"></script>
    <script src="/static/js/jobs.js"></script>
    <script src="/static/js/app.js"></script>
    
    <script>
        // Password visibility toggle
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleBtn = document.querySelector('.password-toggle i');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleBtn.className = 'ri-eye-off-line';
            } else {
                passwordInput.type = 'password';
                toggleBtn.className = 'ri-eye-line';
            }
        }
        
        // Remember me functionality
        if (localStorage.getItem('rememberedUsername')) {
            document.getElementById('username').value = localStorage.getItem('rememberedUsername');
            document.getElementById('rememberMe').checked = true;
        }
    </script>
</body>
</html>
